[global]
    server role = standalone server
    workgroup = WORKGROUP
    security = user
    map to guest = never
    ntlm auth = yes
    lanman auth = yes
    smb ports = 445
    disable netbios = yes
    server min protocol = SMB2
    load printers = no
    printing = bsd
    printcap name = /dev/null
    log file = /dev/stdout
    max log size = 0

[share]
    path = /srv/share
    browseable = yes
    writable = yes
    read only = no
    valid users = demo
    force user = demo
    create mask = 0644
    directory mask = 0755
